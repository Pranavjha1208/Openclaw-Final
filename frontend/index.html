<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixit Chat — OpenClaw demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Fixit Chat</h1>
        <p class="subtitle">OpenClaw gateway demo</p>
      </header>

      <div class="app-layout">
        <aside class="sidebar">
      <section class="config" id="config">
        <h2>Connection</h2>
        <div class="config-row">
          <label for="apiBase">API base URL</label>
          <input
            id="apiBase"
            type="text"
            value=""
            placeholder="http://localhost:18789 (or leave empty to use proxy)"
          />
        </div>
        <div class="config-row two-cols">
          <div>
            <label for="orgId">Org ID <span class="required">(required)</span></label>
            <input id="orgId" type="text" value="" placeholder="e.g. ORG_CL2BNZK9" required />
          </div>
          <div>
            <label for="userId">User ID <span class="required">(required)</span></label>
            <input id="userId" type="text" value="" placeholder="e.g. usr_demo or phone" required />
          </div>
        </div>
        <div class="config-row">
          <label for="campaignId">Campaign ID (optional)</label>
          <input
            id="campaignId"
            type="text"
            value=""
            placeholder="e.g. campaign_xxx (leave empty for all campaigns)"
          />
        </div>
        <div class="config-row">
          <label for="jwt">JWT (Bearer token)</label>
          <textarea id="jwt" rows="3" placeholder="Paste a Fixit JWT or click Generate JWT below..."></textarea>
        </div>
        <div class="config-actions">
          <button type="button" id="btnGenerateJwt">Generate JWT</button>
          <button type="button" id="btnVerify">Verify token</button>
          <span id="verifyStatus" class="status"></span>
        </div>
        <div class="config-row jwt-command" id="jwtCommandRow">
          <label>Or run in terminal (from repo root):</label>
          <div class="command-wrap">
            <code id="jwtCommand"></code>
            <button type="button" id="btnCopyCommand" class="small">Copy</button>
          </div>
        </div>
      </section>

      <section class="sessions" id="sessionsSection">
        <h2>Sessions</h2>
        <div class="session-actions">
          <button type="button" id="btnNewSession">New conversation</button>
          <button type="button" id="btnListSessions">Refresh list</button>
        </div>
        <ul id="sessionList" class="session-list"></ul>
        <p id="sessionHint" class="hint">Create a session or start typing; current session is used for chat.</p>
      </section>
        </aside>

        <main class="chat-panel">
      <section class="chat" id="chatSection">
        <h2>Chat</h2>
        <div id="messages" class="messages"></div>
        <div class="typing-indicator" id="typingIndicator" aria-hidden="true">
          <span class="typing-dots"><span></span><span></span><span></span></span>
          <span class="typing-label">Assistant is typing</span>
        </div>
        <div class="input-row">
          <input
            id="messageInput"
            type="text"
            placeholder="Type a message..."
            autocomplete="off"
          />
          <button type="button" id="btnSend">Send</button>
          <button type="button" id="btnAbort" class="secondary" disabled>Stop</button>
        </div>
        <div id="streamStatus" class="stream-status"></div>
      </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
